<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Transport ERP Lite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">T</span>
        <div>
          <strong>Transport ERP</strong>
          <small id="versionBadge"></small>
        </div>
      </div>

      <nav class="tabs" aria-label="Main navigation">
        <button class="tab active" data-page="dashboard" type="button">Dashboard</button>
        <button class="tab" data-page="customers" type="button">ลูกค้า</button>
        <button class="tab" data-page="trips" type="button">เที่ยววิ่งงาน</button>
        <button class="tab" data-page="hr" type="button">HR Settlement</button>
        <button class="tab" data-page="subcontractor" type="button">รถร่วม Settlement</button>
        <button class="tab" data-page="accounting" type="button">บัญชี</button>
        <button class="tab" data-page="settings" type="button">ตั้งค่า</button>
      </nav>

      <button id="btnSync" type="button" class="btn secondary sidebar-sync">Sync</button>
    </aside>

    <div class="main-area">
      <main id="app" class="app-shell" tabindex="-1"></main>
    </div>
  </div>

  <div id="modalRoot" class="modal-root"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
